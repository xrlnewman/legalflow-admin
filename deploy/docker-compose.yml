name: legalflow

services:
  api:
    image: legalflow-api:local
    build: { context: .., dockerfile: deploy/Dockerfile }
    ports: ["${LEGALFLOW_HTTP_PORT:-8080}:8080"]
    environment:
      HTTP_ADDR: ":8080"
      MYSQL_DSN: legalflow:legalflow@tcp(mysql:3306)/legalflow?parseTime=true&charset=utf8mb4
      REDIS_ADDR: redis:6379
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }
  mysql:
    image: mysql:8.4
    environment: { MYSQL_DATABASE: legalflow, MYSQL_USER: legalflow, MYSQL_PASSWORD: legalflow, MYSQL_ROOT_PASSWORD: change-me }
    volumes: ["./mysql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro"]
    healthcheck: { test: ["CMD-SHELL", "mysql --protocol=TCP --host=127.0.0.1 --user=legalflow --password=legalflow --database=legalflow -e 'SELECT 1' >/dev/null 2>&1"], interval: 5s, timeout: 3s, retries: 60 }
  redis:
    image: redis:8-alpine
    healthcheck: { test: ["CMD", "redis-cli", "ping"], interval: 5s, timeout: 3s, retries: 20 }
